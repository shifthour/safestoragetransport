name: Build and Deploy to cPanel

# Every push to main: build in the cloud (clean env — no CloudLinux/Turbopack issues),
# then upload the build + source to the cPanel server over FTP and restart Passenger.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22 (matches the server runtime)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Stamp restart trigger (forces Passenger to restart after deploy)
        run: mkdir -p tmp && echo "${{ github.sha }}" > tmp/restart.txt

      - name: Deploy over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          # cPanel main-account FTP lands in /home/<user>, so the app dir is this relative path.
          # If deploy fails with "directory not found", adjust this to match your FTP root.
          server-dir: public_html/safestorage-transport/
          local-dir: ./
          # node_modules stays on the server (CloudLinux symlink); never upload it.
          # .next/cache is build-only and huge — skip it.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            **/.next/cache/**
